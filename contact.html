<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout & Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Nova<span>Market</span></a>
            <nav class="nav-menu" id="navMenu"><a href="index.html" class="nav-link">Home</a><a href="products.html" class="nav-link">Products</a><a href="contact.html" class="nav-link active">Contact/Cart <span id="navCartCount" class="cart-count hidden">0</span></a></nav>
            <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
        </div>
    </header>
    <main class="container multi-col-layout">
        <section>
            <h2 style="margin-bottom:20px;">Persistent Selection Store</h2>
            <div id="cartItemsContainer"></div>
            <button id="clearCartBtn" class="btn btn-secondary" style="margin-top:10px;">Clear Array Storage</button>
        </section>
        <section>
            <h2 style="margin-bottom:20px;">Constraint Form</h2>
            <form id="validatedForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" required minlength="3" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" required pattern="[0-9]{7,15}" placeholder="599123456">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Submit Package</button>
            </form>
        </section>
    </main>
    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Nova Market.</p>
            <div class="footer-links"><a href="index.html">Home</a><a href="products.html">Products</a><a href="contact.html">Contact</a></div>
        </div>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
